# Root pre-commit configuration for Ply Monorepo
# Reference: api/.pre-commit-config.yaml and client/.lintstagedrc

repos:
  # --- General Hooks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^(.vscode/|tsconfig.json)
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key

  # --- Python (API) Hooks ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^api/
      - id: ruff-format
        files: ^api/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0.0
          - types-requests
          - sqlmodel
        args: [--strict, --ignore-missing-imports, --config-file=api/pyproject.toml]
        files: ^api/

  # --- Frontend (Client & Root) Hooks ---
  # Using local hooks to leverage the project's installed oxlint/oxfmt
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: npx oxlint --fix
        language: system
        types_or: [javascript, ts, vue]
        files: ^(client/src/|components/|composables/|server/|shared/)

      - id: oxfmt
        name: oxfmt
        entry: npx oxfmt
        language: system
        types_or: [javascript, ts, vue]
        files: ^(client/src/|components/|composables/|server/|shared/)
